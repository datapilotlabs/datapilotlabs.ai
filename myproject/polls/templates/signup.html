{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Datapilot | Signup</title>

<link rel="icon" type="image/png" href="{% static 'images/logo.png' %}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background:#060910;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
background:#060910;
overflow-x:hidden;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
z-index:1000;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* CENTER SIGNUP FORM */

.signup-wrapper{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding-top:90px;
}

/* FORM BOX */

.containers{
width:380px;
padding:40px;
background:white;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

/* TITLE */

.container h2{
margin-bottom:25px;
color:#333;
}

/* FORM */

form{
display:flex;
flex-direction:column;
}

input{
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:6px;
font-size:15px;
transition:0.3s;
}

input:focus{
border-color:#667eea;
box-shadow:0 0 5px rgba(102,126,234,0.4);
outline:none;
}

/* BUTTON */

button{
padding:12px;
background:#667eea;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#5a67d8;
}

/* LINKS */

.link{
margin-top:15px;
font-size:14px;
}

.link a{
text-decoration:none;
color:#667eea;
font-weight:500;
}

.link a:hover{
text-decoration:none;
}

/* FOOTER */

footer{
background:#000;
padding:20px;
text-align:center;
color:#aaa;
}

/* MOBILE */

@media(max-width:450px){

.containers{
width:90%;
}

}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">

<a class="navbar-brand d-flex align-items-center" href="#">
<img src="{% static 'images/logo.png' %}" width="40" class="me-2">
Datapilot
</a>

<div class="ms-auto">
<a href="{% url 'home'%}" class="btn btn-outline-light me-2">Home</a>
<a href="{% url 'about'%}" class="btn btn-outline-light me-2">About</a>
<a href="{% url 'contact'%}" class="btn btn-outline-light me-2">Contact</a>
<a href="{% url 'login' %}" class="btn btn-outline-light me-2">Login</a>
<a href="{% url 'signup' %}" class="btn btn-primary">Signup</a>
</div>

</div>
</nav>


<!-- CENTERED SIGNUP FORM -->

<div class="signup-wrapper">

<div class="containers">

<h2>Create Account</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Signup</button>

</form>

<p style="color: #000;">
Already have an account?
</p>
<a href="{% url 'login' %}">Login</a>

</div>

</div>


<footer>
<p>© 2026 DataPilot. All Rights Reserved.</p>
</footer>


<script>

/* CANVAS */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;


/* STARS */

let stars = [];

for (let i = 0; i < 150; i++) {
stars.push({
x: Math.random() * canvas.width,
y: Math.random() * canvas.height,
r: Math.random() * 1.5
});
}


/* METEOR COLORS */

const colors = [
"#00c6ff",
"#ff4ecd",
"#7c4dff",
"#00ffcc",
"#ffd700"
];


/* METEORS */

let meteors = [];

function createMeteor(){

meteors.push({
x: Math.random() * canvas.width,
y: 0,
length: Math.random() * 100 + 60,
speed: Math.random() * 6 + 4,
color: colors[Math.floor(Math.random()*colors.length)]
});

}

setInterval(createMeteor,1500);


/* ANIMATION */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

stars.forEach(star=>{
ctx.beginPath();
ctx.arc(star.x,star.y,star.r,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();
});

meteors.forEach((meteor,index)=>{

ctx.beginPath();
ctx.moveTo(meteor.x,meteor.y);
ctx.lineTo(meteor.x-meteor.length,meteor.y+meteor.length);
ctx.strokeStyle=meteor.color;
ctx.lineWidth=3;
ctx.stroke();

meteor.x-=meteor.speed;
meteor.y+=meteor.speed;

if(meteor.x<-100 || meteor.y>canvas.height+100){
meteors.splice(index,1);
}

});

requestAnimationFrame(animate);

}

animate();


/* RESPONSIVE */

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

});

</script>

</body>

</html>
